<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Bedroom with warm carpet flooring">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#302f2a"/>
      <stop offset="1" stop-color="#151513"/>
    </linearGradient>
    <linearGradient id="carpet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9b8462"/>
      <stop offset="1" stop-color="#6f5c43"/>
